<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CradleLog - Yönlendiriliyor...</title>
    <!-- Meta Refresh as initial fallback -->
    <meta http-equiv="refresh" content="0;url=https://apps.apple.com/app/id6759116053">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0071e3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #0071e3;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>App Store'a Yönlendiriliyorsunuz</h1>
        <p>Eğer otomatik olarak yönlendirilmezseniz, lütfen <a href="https://apps.apple.com/app/id6759116053">buraya tıklayın</a>.</p>
    </div>

    <script>
        // JS redirect for better control
        setTimeout(function() {
            window.location.replace("https://apps.apple.com/app/id6759116053");
        }, 100);
    </script>
</body>
</html>
