<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; color: white; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #2563eb; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        // Redirect to English as default
        window.location.replace("global.html");
    </script>
</head>
<body>
    <div style="text-align: center;">
        <div class="spinner" style="margin: 0 auto 1.5rem;"></div>
        <p>Redirecting to default language (English)...</p>
        <p style="font-size: 14px; color: #94a3b8; margin-top: 1rem;">If not redirected, <a href="en.html" style="color: #2563eb;">click here</a>.</p>
    </div>
</body>
</html>
